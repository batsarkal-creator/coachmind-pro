<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoachMind Pro - عقل المدرب الذكي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/dashboard.css">
    <link rel="stylesheet" href="src/css/folders.css">
    <link rel="stylesheet" href="src/css/modal.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">🧠</div>
                <div class="logo-text">
                    <h1>CoachMind</h1>
                    <span>عقل المدرب الذكي</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-label">المكتبة الرئيسية</div>
                <div class="nav-item active" data-view="dashboard">
                    <span class="icon">📊</span> لوحة التحكم
                </div>
                <div class="nav-item" data-view="folders">
                    <span class="icon">📁</span> المجلدات
                    <span class="badge" id="folderCount">6</span>
                </div>
                <div class="nav-item" data-view="plans">
                    <span class="icon">📋</span> خطط التدريب
                    <span class="badge">12</span>
                </div>
                <div class="nav-item" data-view="exercises">
                    <span class="icon">🏋️</span> تمارين
                    <span class="badge">48</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-label">أدوات المدرب</div>
                <div class="nav-item" data-view="ai">
                    <span class="icon">🤖</span> محلل AI
                </div>
                <div class="nav-item" data-view="analytics">
                    <span class="icon">📈</span> التحليلات
                </div>
                <div class="nav-item" data-view="clients">
                    <span class="icon">👥</span> المتدربين
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-label">الإعدادات</div>
                <div class="nav-item" data-view="settings">
                    <span class="icon">⚙️</span> الإعدادات
                </div>
                <div class="nav-item" data-view="help">
                    <span class="icon">❓</span> المساعدة
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="top-bar">
                <div class="breadcrumb">
                    <span>🏠</span>
                    <span class="sep">/</span>
                    <span class="current" id="currentPath">لوحة التحكم</span>
                </div>
                <div class="top-actions">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" placeholder="ابحث في الملفات والتمارين..." id="searchInput">
                    </div>
                    <button class="btn" id="notifBtn">🔔</button>
                    <button class="btn btn-primary" id="createBtn">
                        <span>➕</span> جديد
                    </button>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Content injected by JS -->
            </div>
        </main>
    </div>

    <!-- AI Insight Panel -->
    <div class="insight-panel" id="insightPanel">
        <div class="insight-header" id="insightToggle">
            <h4>🧠 توصيات المدرب الذكي</h4>
            <span class="insight-toggle">🔽</span>
        </div>
        <div class="insight-body" id="insightBody">
            <!-- Injected by JS -->
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">تفاصيل</h2>
                <button class="modal-close" id="modalClose">✕</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal modal-login">
            <div class="modal-header" style="padding-bottom: 0; border-bottom: none;">
                <div class="auth-tabs" style="display: flex; width: 100%; gap: 4px; background: var(--bg-panel); padding: 4px; border-radius: var(--radius-md);">
                    <button class="auth-tab active" data-tab="login" style="flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; transition: all 0.2s;">
                        تسجيل الدخول
                    </button>
                    <button class="auth-tab" data-tab="register" style="flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; transition: all 0.2s;">
                        حساب جديد
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <!-- Login Form -->
                <form id="loginForm" class="auth-form active">
                    <div class="form-group">
                        <label>اسم المستخدم</label>
                        <input type="text" name="username" required autocomplete="username" placeholder="أدخل اسم المستخدم">
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" name="password" required autocomplete="current-password" placeholder="أدخل كلمة المرور">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">دخول</button>
                </form>

                <!-- Register Form -->
                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" name="full_name" required placeholder="مثال: محمد أحمد">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>اسم المستخدم</label>
                            <input type="text" name="username" required autocomplete="username" placeholder="اسم للدخول">
                        </div>
                        <div class="form-group">
                            <label>البريد الإلكتروني</label>
                            <input type="email" name="email" required placeholder="example@email.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" name="password" required autocomplete="new-password" placeholder="8 أحرف على الأقل" minlength="6">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>العمر</label>
                            <input type="number" name="age" min="10" max="100" placeholder="25">
                        </div>
                        <div class="form-group">
                            <label>الوزن (كجم)</label>
                            <input type="number" name="weight" step="0.1" min="20" max="300" placeholder="75">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>الطول (سم)</label>
                            <input type="number" name="height" step="0.1" min="100" max="250" placeholder="175">
                        </div>
                        <div class="form-group">
                            <label>الهدف</label>
                            <select name="fitness_goal" class="form-select">
                                <option value="muscle_gain">زيادة الكتلة العضلية</option>
                                <option value="fat_loss">حرق الدهون</option>
                                <option value="endurance">تحسين التحمل</option>
                                <option value="strength">زيادة القوة</option>
                                <option value="flexibility">تحسين المرونة</option>
                                <option value="general">لياقة عامة</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">إنشاء الحساب</button>
                </form>

                <p style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 13px;">
                    حساب تجريبي: demo / demo123
                </p>
                <div id="loginError" style="color: var(--danger); text-align: center; margin-top: 12px; display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="src/js/app.js"></script>
</body>
</html>
