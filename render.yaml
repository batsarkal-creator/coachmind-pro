services:
  - type: web
    name: coachmind-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: CORS_ORIGINS
        value: "https://coachmind-pro.netlify.app"
      - key: DATABASE_URL
        fromDatabase:
          name: coachmind-db
          property: connectionString

  - type: web
    name: coachmind-frontend
    runtime: static
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: coachmind-db
    databaseName: coachmind
    user: coachmind
    plan: free